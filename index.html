<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Hub – PESITM</title>
  <meta name="description" content="PESITM AI Academic Resource Hub – browse department notes, modules, and topics." />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Segoe UI', 'system-ui', 'sans-serif'],
          },
          colors: {
            primary: {
              DEFAULT: '#2563eb',
              5: 'rgba(37,99,235,0.05)',
              10: 'rgba(37,99,235,0.10)',
              20: 'rgba(37,99,235,0.20)',
              30: 'rgba(37,99,235,0.30)',
            },
            destructive: {
              5: 'rgba(239,68,68,0.05)',
            },
            muted: {
              DEFAULT: '#f1f5f9',
              foreground: '#64748b',
              50: 'rgba(241,245,249,0.5)',
            },
            border: '#e2e8f0',
          },
        },
      },
    };
  </script>

  <style>
    body { font-family: 'Inter', 'Segoe UI', system-ui, sans-serif; }

    /* Custom select: hide native arrow */
    select.custom-select {
      appearance: none;
      -webkit-appearance: none;
    }

    select.custom-select:invalid {
      color: #64748b; /* placeholder color */
    }

    select.custom-select option {
      color: #0f172a; /* regular option text color */
    }

    /* Smooth fade-in */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: none; }
    }
    .animate-fade-in {
      animation: fadeInUp 0.5s ease-out both;
    }
    .animate-fade-in-delay {
      animation: fadeInUp 0.5s ease-out 0.15s both;
    }
  </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#f0f2f8] via-white to-[#fef5f2] relative overflow-x-hidden">

  <!-- ── Decorative Blurred Orbs ── -->
  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-destructive-5 rounded-full blur-3xl pointer-events-none"></div>

  <!-- ══════════ HEADER ══════════ -->
  <header class="px-6 py-4 border-b border-primary-10 bg-white/70 backdrop-blur-md sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <!-- Left: back + logo -->
      <div class="flex items-center gap-4">
        <button class="p-2 hover:bg-primary-10 rounded-lg transition-colors text-primary" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
          </svg>
        </button>
        <!-- PESITM Logo placeholder (blue square + text) -->
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-gradient-to-br from-primary to-blue-700 flex items-center justify-center shadow-md">
            <span class="text-white text-lg md:text-xl font-bold select-none">R</span>
          </div>
          <span class="hidden sm:block text-lg font-bold text-primary tracking-tight">Resource Hub</span>
        </div>
      </div>

      <!-- Right: subtitle -->
      <div class="text-sm text-muted-foreground hidden md:block font-medium">
        AI Academic Resource Hub
      </div>
    </div>
  </header>

  <!-- ══════════ MAIN ══════════ -->
  <main class="max-w-7xl mx-auto px-6 py-8 md:py-12 relative">

    <!-- ── Filter Card ── -->
    <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-primary-10 p-6 md:p-8 mb-8 animate-fade-in">

      <h2 class="text-2xl md:text-3xl font-semibold mb-6 text-primary">
        Select Your Course Details
      </h2>

      <!-- 5-column grid -->
      <div class="grid sm:grid-cols-2 lg:grid-cols-5 gap-4">

        <!-- Department -->
        <div class="space-y-2">
          <label for="department" class="block text-sm text-muted-foreground font-medium">Department</label>
          <div class="relative">
            <select
              id="department"
              required
              class="custom-select w-full px-4 py-3 rounded-xl border transition-all bg-white hover:border-primary-30 focus:border-primary focus:ring-2 focus:ring-primary-20 border-primary-10 focus:outline-none text-sm font-medium cursor-pointer"
            >
              <option value="" disabled selected style="display:none;">Select Department</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground pointer-events-none">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
        </div>

        <!-- Semester -->
        <div class="space-y-2">
          <label for="semester" class="block text-sm text-muted-foreground font-medium">Semester</label>
          <div class="relative">
            <select
              id="semester"
              required
              disabled
              class="custom-select w-full px-4 py-3 rounded-xl border transition-all bg-muted-50 cursor-not-allowed text-muted-foreground border-border focus:outline-none text-sm font-medium"
            >
              <option value="" disabled selected style="display:none;">Select Semester</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground pointer-events-none">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
        </div>

        <!-- Subject -->
        <div class="space-y-2">
          <label for="subject" class="block text-sm text-muted-foreground font-medium">Subject</label>
          <div class="relative">
            <select
              id="subject"
              required
              disabled
              class="custom-select w-full px-4 py-3 rounded-xl border transition-all bg-muted-50 cursor-not-allowed text-muted-foreground border-border focus:outline-none text-sm font-medium"
            >
              <option value="" disabled selected style="display:none;">Select Subject</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground pointer-events-none">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
        </div>

        <!-- Module -->
        <div class="space-y-2">
          <label for="module" class="block text-sm text-muted-foreground font-medium">Module</label>
          <div class="relative">
            <select
              id="module"
              required
              disabled
              class="custom-select w-full px-4 py-3 rounded-xl border transition-all bg-muted-50 cursor-not-allowed text-muted-foreground border-border focus:outline-none text-sm font-medium"
            >
              <option value="" disabled selected style="display:none;">Select Module</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground pointer-events-none">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
        </div>

        <!-- Topic -->
        <div class="space-y-2">
          <label for="topic" class="block text-sm text-muted-foreground font-medium">Topic</label>
          <div class="relative">
            <select
              id="topic"
              required
              disabled
              class="custom-select w-full px-4 py-3 rounded-xl border transition-all bg-muted-50 cursor-not-allowed text-muted-foreground border-border focus:outline-none text-sm font-medium"
            >
              <option value="" disabled selected style="display:none;">Select Topic</option>
            </select>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
              class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-muted-foreground pointer-events-none">
              <path d="m6 9 6 6 6-6"></path>
            </svg>
          </div>
        </div>

      </div>
      <!-- /grid -->
    </div>
    <!-- /Filter Card -->

    <!-- ── Empty State ── -->
    <div id="empty-state" class="text-center py-16 animate-fade-in-delay">
      <div class="inline-flex p-4 rounded-full bg-primary-10 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="text-primary">
          <path d="m6 9 6 6 6-6"></path>
        </svg>
      </div>
      <h3 class="text-xl font-semibold mb-2 text-primary">Select a topic to get started</h3>
      <p class="text-muted-foreground max-w-md mx-auto">
        Choose your department, semester, subject, module, and topic to view curated resources
      </p>
    </div>

    <!-- ── Results Area (hidden until search) ── -->
    <div id="results-area" class="hidden">
      <!-- Future: results will render here -->
    </div>

  </main>

  <!-- ── Error Toast ── -->
  <div
    id="error-toast"
    role="alert"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 hidden items-center gap-3 bg-red-50 border border-red-200 text-red-700 text-sm font-medium px-5 py-3 rounded-xl shadow-lg max-w-lg"
  >
    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <span id="error-toast-msg">Server offline</span>
  </div>

  <!-- ══════════ JAVASCRIPT ══════════ -->
  <script>
    // ── Config ────────────────────────────────────────────────────
    const BASE_URL = '/api';

    // ── Class constants ───────────────────────────────────────────
    const ENABLED_CLS  = 'custom-select w-full px-4 py-3 rounded-xl border transition-all bg-white hover:border-primary-30 focus:border-primary focus:ring-2 focus:ring-primary-20 border-primary-10 focus:outline-none text-sm font-medium cursor-pointer';
    const DISABLED_CLS = 'custom-select w-full px-4 py-3 rounded-xl border transition-all bg-muted-50 cursor-not-allowed text-muted-foreground border-border focus:outline-none text-sm font-medium';

    // ── Toast ──────────────────────────────────────────────────────
    function showToast(message, durationMs) {
      durationMs = durationMs || 5000;
      var toast = document.getElementById('error-toast');
      var msg   = document.getElementById('error-toast-msg');
      msg.textContent = message;
      toast.classList.remove('hidden');
      toast.classList.add('flex');
      setTimeout(function() {
        toast.classList.add('hidden');
        toast.classList.remove('flex');
      }, durationMs);
    }

    // ── Populate helper ────────────────────────────────────────────
    function populateSelect(selectId, items, valueKey, labelKey) {
      var sel = document.getElementById(selectId);
      sel.options.length = 1;
      items.forEach(function(item) {
        var opt = document.createElement('option');
        opt.className = 'bg-white text-slate-800';
        if (typeof item === 'object' && item !== null) {
          opt.value       = item[valueKey] != null ? item[valueKey] : item[labelKey];
          opt.textContent = item[labelKey];
        } else {
          opt.value = opt.textContent = item;
        }
        sel.appendChild(opt);
      });
      sel.selectedIndex = 0;
      sel.value = "";
    }

    // ── Lock / Unlock ──────────────────────────────────────────────
    function lockSelect(id) {
      var sel = document.getElementById(id);
      sel.options.length = 1;
      sel.selectedIndex = 0; // ensure placeholder is selected
      sel.disabled  = true;
      sel.className = DISABLED_CLS;
    }

    function unlockSelect(id) {
      var sel = document.getElementById(id);
      sel.disabled  = false;
      sel.className = ENABLED_CLS;
    }

    // ── Fetch helper ───────────────────────────────────────────────
    async function fetchJSON(endpoint) {
      var res = await fetch(BASE_URL + endpoint);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' from ' + endpoint);
      return res.json();
    }

    // ══════════ ON PAGE LOAD ══════════
    window.addEventListener('load', async function() {
      var errors = [];

      // 1. Departments → [{id, name}]
      try {
        var departments = await fetchJSON('/departments');
        populateSelect('department', departments, 'id', 'name');
        unlockSelect('department');
        console.info('[res_hub] Departments loaded:', departments.length);
      } catch (e) {
        console.error('[res_hub] departments:', e.message);
        errors.push('departments');
      }

      // 2. Semesters — loaded but select stays disabled until department is picked
      //    (matching Figma behavior: semester unlocks after dept selection)

      if (errors.length) {
        showToast('Server offline - could not load ' + errors.join(' & ') + '. Start the server on port 3000.');
      }
    });

    // ══════════ CASCADE 1: Department → unlock Semester ══════════
    document.getElementById('department').addEventListener('change', async function() {
      // Reset everything downstream
      lockSelect('subject');
      lockSelect('module');
      lockSelect('topic');

      if (!this.value) {
        lockSelect('semester');
        return;
      }

      // Load semesters (they're global, not per-department, but we unlock after dept pick)
      try {
        var semesters = await fetchJSON('/semesters');
        // Format semester labels
        var formattedSemesters = semesters.map(function(s) {
          return { id: s.id, name: 'Semester ' + s.semester_number };
        });
        populateSelect('semester', formattedSemesters, 'id', 'name');
        unlockSelect('semester');
        console.info('[res_hub] Semesters loaded:', semesters.length);
      } catch (e) {
        console.error('[res_hub] semesters:', e.message);
        showToast('Could not load semesters.');
      }
    });

    // ══════════ CASCADE 2: Dept + Sem → Subjects ══════════
    document.getElementById('semester').addEventListener('change', async function() {
      var deptId = document.getElementById('department').value;
      var semId  = this.value;

      lockSelect('subject');
      lockSelect('module');
      lockSelect('topic');

      if (!deptId || !semId) return;

      try {
        var subjects = await fetchJSON('/subjects/' + deptId + '/' + semId);
        populateSelect('subject', subjects, 'id', 'subject_name');
        unlockSelect('subject');
        console.info('[res_hub] Subjects loaded:', subjects.length);
      } catch (e) {
        console.error('[res_hub] subjects:', e.message);
        showToast('Could not load subjects.');
      }
    });

    // ══════════ CASCADE 3: Subject → Modules ══════════
    document.getElementById('subject').addEventListener('change', async function() {
      lockSelect('module');
      lockSelect('topic');
      if (!this.value) return;

      try {
        var modules = await fetchJSON('/modules/' + this.value);
        var sel = document.getElementById('module');
        sel.options.length = 1;
        modules.forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.module_number + ' \u2013 ' + m.module_title;
          opt.className = 'bg-white text-slate-800';
          sel.appendChild(opt);
        });
        sel.selectedIndex = 0;
        sel.value = "";
        unlockSelect('module');
        console.info('[res_hub] Modules loaded:', modules.length);
      } catch (e) {
        console.error('[res_hub] modules:', e.message);
        showToast('Could not load modules.');
      }
    });

    // ══════════ CASCADE 4: Module → Topics ══════════
    document.getElementById('module').addEventListener('change', async function() {
      lockSelect('topic');
      if (!this.value) return;

      try {
        var topics = await fetchJSON('/topics/' + this.value);
        populateSelect('topic', topics, 'id', 'topic_name');
        unlockSelect('topic');
        console.info('[res_hub] Topics loaded:', topics.length);
      } catch (e) {
        console.error('[res_hub] topics:', e.message);
        showToast('Could not load topics.');
      }
    });

    // ══════════ CASCADE 5: Topic selected → trigger search ══════════
    document.getElementById('topic').addEventListener('change', async function() {
      var topicId   = this.value;
      var topicName = this.options[this.selectedIndex] ? this.options[this.selectedIndex].text : '';
      if (!topicId) return;

      // Hide empty state, show results area
      document.getElementById('empty-state').classList.add('hidden');
      var resultsArea = document.getElementById('results-area');
      resultsArea.classList.remove('hidden');
      resultsArea.innerHTML = '<div class="text-center py-12"><div class="inline-flex items-center gap-3 text-primary"><svg class="animate-spin w-6 h-6" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/><path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><span class="text-lg font-medium">Searching for resources\u2026</span></div></div>';

      try {
        var res = await fetch(BASE_URL + '/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topicId: topicId, topicName: topicName })
        });
        var data = await res.json();
        console.info('[res_hub] Search triggered:', data.message);
        resultsArea.innerHTML = '<div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg border border-primary-10 p-6 md:p-8 animate-fade-in"><div class="flex items-center gap-3 mb-4"><div class="p-2 rounded-lg bg-green-100"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg></div><h3 class="text-lg font-semibold text-primary">' + data.message + '</h3></div><p class="text-muted-foreground text-sm">Results from the n8n workflow will appear here once configured.</p></div>';
      } catch (e) {
        console.error('[res_hub] search failed:', e.message);
        resultsArea.innerHTML = '';
        document.getElementById('empty-state').classList.remove('hidden');
        showToast('Search failed - check the server.');
      }
    });
  </script>

</body>
</html>
